<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="peaje.css" />
    <script src="vistaWeb.js"></script>
  </head>
  <body>
    <script src="utilesVista.js"></script>
    <div class="login-container">
      <h2>Iniciar Sesión</h2>
      <form
        id="formLogin"
        action="/ingreso/loginPropietario"
        method="post"
        onsubmit="acceder(event);"
      >
        <div class="form-group">
          <label for="cedula">Cedula:</label>
          <input type="text" id="cedula" name="cedula" required />
        </div>
        <div class="form-group">
          <label for="contrasenia">Contraseña:</label>
          <input type="password" id="contrasenia" name="password" required />
        </div>
        <button type="submit" class="btn-acceder">Acceder</button>
      </form>
    </div>
  </body>

  <script>
    function acceder(event) {
      event.preventDefault(); // Evita el envío del formulario por defecto
      submit("ingreso/loginPropietario", serializarFormulario("formLogin"));
    }

    function mostrar_loginExitoso(urlDestino) {
      window.location.href = urlDestino;
      alert("Login exitoso");
    }

    async function mostrar_error(mensaje) {
        await mostrarMensaje(mensaje);
    }

    async function excepcionDeAplicacion(text){
            await mostrarMensaje(text);
        }
  </script>
</html>
