<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda - Principal</title>
  <link rel="stylesheet" href="peaje.css" />
  <script src="vistaWeb.js"></script>
</head>

<body>
  <div class="sidebar">
    <label id="nombreCompleto"> </label>

    <button onclick="cargarContenido('emularTransito.html')">
      Emular Tránsito
    </button>

    <!-- 👇 NUEVO: botón para Asignar Bonificaciones -->
    <button onclick="cargarContenido('asignar-bonificaciones.html')">
      Asignar Bonificaciones
    </button>

    <button onclick="cargarContenido('CambiarEstado.html')">
      Cambiar Estado
    </button>

    <button onclick="logout()">Salir</button>
  </div>

  <div class="content">
    <iframe id="contenidoFrame" src="emularTransito.html" frameborder="0"></iframe>
  </div>

  <script>
    urlIniciarVista = "/menuAdmin/vistaConectada";
    const spnNombreCompleto = document.getElementById("nombreCompleto");

    function cargarContenido(pagina) {
      document.getElementById("contenidoFrame").src = pagina;
    }

    function logout() {
      submit("/ingreso/logoutAdmin", null);
    }

    function mostrar_usuarioNoAutenticado(urlDestino) {
      window.location.href = urlDestino;
    }

    function mostrar_nombreCompleto(nombreCompleto) {
      spnNombreCompleto.innerHTML = "ADMIN: " + nombreCompleto.toUpperCase();
    }
  </script>
</body>

</html>
